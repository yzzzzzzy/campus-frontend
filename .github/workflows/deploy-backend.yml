name: Deploy Fullstack to Tencent Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 执行远程部署脚本
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # ==============================
          # 1. 拉取最新源码 (前后端一起拉)
          # ==============================
          cd /var/www/campus-backend
          git fetch --all
          git reset --hard origin/main
          git pull
          
          # ==============================
          # 2. 部署后端
          # ==============================
          npm install
          pm2 restart campus-api
          
          # ==============================
          # 3. 部署前端 (新增的魔法环节！)
          # ==============================
          # 进入前端文件夹
          cd campus-frontend
          # 安装前端依赖 (只在有新包时耗时)
          npm install
          # 执行 Vite 打包
          npm run build
          # 把打包好的 dist 目录里的最新网页，直接覆盖到 Nginx 的地盘去！
          cp -r dist/* /var/www/campus-frontend/
          
          echo "🚀 全栈自动化部署大功告成！"